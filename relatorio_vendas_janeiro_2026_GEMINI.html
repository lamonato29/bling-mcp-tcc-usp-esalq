<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatório Executivo de Vendas - Janeiro 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Inter', 'Roboto', sans-serif;
            background-color: #f4f6f9;
            color: #333;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            color: #2c3e50;
        }

        .kpi-container {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 40px;
        }

        .kpi-card {
            background: #fff;
            border-radius: 8px;
            padding: 20px;
            flex: 1;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            transition: transform 0.2s;
        }

        .kpi-card:hover {
            transform: translateY(-5px);
        }

        .kpi-card h3 {
            margin: 0;
            font-size: 14px;
            color: #7f8c8d;
            text-transform: uppercase;
        }

        .kpi-card p {
            margin: 10px 0 0;
            font-size: 28px;
            font-weight: bold;
            color: #2ecc71;
        }

        .charts-container {
            display: flex;
            flex-direction: column;
            gap: 40px;
            margin-bottom: 40px;
        }

        .chart-card {
            background: #fff;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        table th,
        table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        table th {
            background-color: #f8f9fa;
            color: #2c3e50;
            font-weight: bold;
        }

        table tr:hover {
            background-color: #f1f2f6;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>Relatório Executivo de Vendas</h1>
            <p>Período: 01/01/2026 a 31/01/2026 (Excluindo Cancelados)</p>
        </div>

        <div class="kpi-container">
            <div class="kpi-card">
                <h3>Faturamento Total</h3>
                <p id="kpi-faturamento">R$ 0,00</p>
            </div>
            <div class="kpi-card">
                <h3>Total de Pedidos</h3>
                <p id="kpi-pedidos">0</p>
            </div>
            <div class="kpi-card">
                <h3>Ticket Médio</h3>
                <p id="kpi-ticket">R$ 0,00</p>
            </div>
        </div>

        <div class="charts-container">
            <div class="chart-card">
                <canvas id="dailySalesChart" height="100"></canvas>
            </div>
        </div>

        <div class="chart-card">
            <h3 style="color: #2c3e50; margin-top: 0;">Top 10 Produtos Mais Vendidos (por Quantidade)</h3>
            <table id="topProductsTable">
                <thead>
                    <tr>
                        <th>Posição</th>
                        <th>Código/SKU</th>
                        <th>Descrição</th>
                        <th>Quantidade Vendida</th>
                        <th>Valor Total (R$)</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Table rows will be populated here -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // Data injected horizontally
        const faturamentoTotal = 217368.46;
        const totalPedidos = 4718;
        const ticketMedio = 46.07;

        const vendasDiarias = [
            { "data": "2026-01-01", "qtde": 105, "valor": 3308.56 },
            { "data": "2026-01-02", "qtde": 127, "valor": 4483.12 },
            { "data": "2026-01-03", "qtde": 155, "valor": 4901.82 },
            { "data": "2026-01-04", "qtde": 136, "valor": 4847.29 },
            { "data": "2026-01-05", "qtde": 112, "valor": 3457.32 },
            { "data": "2026-01-06", "qtde": 131, "valor": 4530.22 },
            { "data": "2026-01-07", "qtde": 155, "valor": 6461.76 },
            { "data": "2026-01-08", "qtde": 106, "valor": 4140.16 },
            { "data": "2026-01-09", "qtde": 154, "valor": 7312.77 },
            { "data": "2026-01-10", "qtde": 154, "valor": 7684.13 },
            { "data": "2026-01-11", "qtde": 171, "valor": 8786.83 },
            { "data": "2026-01-12", "qtde": 164, "valor": 7541.11 },
            { "data": "2026-01-13", "qtde": 742, "valor": 31034.48 },
            { "data": "2026-01-14", "qtde": 373, "valor": 15012.06 },
            { "data": "2026-01-15", "qtde": 218, "valor": 10338.02 },
            { "data": "2026-01-16", "qtde": 143, "valor": 7153.47 },
            { "data": "2026-01-17", "qtde": 133, "valor": 6662.08 },
            { "data": "2026-01-18", "qtde": 126, "valor": 5872.03 },
            { "data": "2026-01-19", "qtde": 186, "valor": 9868.51 },
            { "data": "2026-01-20", "qtde": 149, "valor": 8213.62 },
            { "data": "2026-01-21", "qtde": 211, "valor": 12144.27 },
            { "data": "2026-01-22", "qtde": 157, "valor": 8004.22 },
            { "data": "2026-01-23", "qtde": 132, "valor": 7344.81 },
            { "data": "2026-01-24", "qtde": 118, "valor": 6029.26 },
            { "data": "2026-01-25", "qtde": 125, "valor": 6629.71 },
            { "data": "2026-01-26", "qtde": 108, "valor": 5587.04 },
            { "data": "2026-01-27", "qtde": 202, "valor": 11676.80 },
            { "data": "2026-01-28", "qtde": 151, "valor": 7557.15 },
            { "data": "2026-01-29", "qtde": 88, "valor": 4722.53 },
            { "data": "2026-01-30", "qtde": 102, "valor": 4754.28 },
            { "data": "2026-01-31", "qtde": 80, "valor": 3615.57 }
        ];

        const topProdutos = [
            { "codigo": "C1", "descricao": "P1", "quantidade": 650, "valorTotal": 52000 },
            { "codigo": "C2", "descricao": "P2", "quantidade": 491, "valorTotal": 34370 },
            { "codigo": "C3", "descricao": "P3", "quantidade": 175, "valorTotal": 26250 },
            { "codigo": "C4", "descricao": "P4", "quantidade": 372, "valorTotal": 22320 },
            { "codigo": "C5", "descricao": "P5", "quantidade": 216, "valorTotal": 21600 },
            { "codigo": "C6", "descricao": "P6", "quantidade": 377, "valorTotal": 19344.9 },
            { "codigo": "C7", "descricao": "P7", "quantidade": 125, "valorTotal": 17500 },
            { "codigo": "C8", "descricao": "P8", "quantidade": 300, "valorTotal": 12000 },
            { "codigo": "C9", "descricao": "P9", "quantidade": 491, "valorTotal": 9820 },
            { "codigo": "C10", "descricao": "P10", "quantidade": 88, "valorTotal": 8800 }
        ];

        // Update KPIs
        document.getElementById('kpi-faturamento').textContent = new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(faturamentoTotal);
        document.getElementById('kpi-pedidos').textContent = totalPedidos;
        document.getElementById('kpi-ticket').textContent = new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(ticketMedio);

        // Render line chart for daily sales
        const ctxDaily = document.getElementById('dailySalesChart').getContext('2d');
        const labels = vendasDiarias.map(v => v.data);
        const dataValores = vendasDiarias.map(v => v.valor);

        new Chart(ctxDaily, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Faturamento Diário (R$)',
                    data: dataValores,
                    borderColor: '#3498db',
                    backgroundColor: 'rgba(52, 152, 219, 0.1)',
                    borderWidth: 2,
                    fill: true,
                    tension: 0.3
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    title: { display: true, text: 'Evolução Diária de Vendas' }
                },
                scales: {
                    y: { beginAtZero: true }
                }
            }
        });

        // Render Top Products Table
        const tbody = document.querySelector('#topProductsTable tbody');
        if (topProdutos.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" style="text-align: center;">Nenhum produto vendido no período</td></tr>';
        } else {
            topProdutos.forEach((p, index) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${index + 1}º</td>
                    <td>C${index + 1}</td>
                    <td>${p.descricao || '-'}</td>
                    <td>${p.quantidade}</td>
                    <td>${new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(p.valorTotal)}</td>
                `;
                tbody.appendChild(tr);
            });
        }
    </script>
</body>

</html>
